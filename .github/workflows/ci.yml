name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck + doc-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs the full chain:
      #   prebuild → tsx scripts/doc-check.ts (registry/doc invariants)
      #   build    → tsc -b (typecheck) + vite build (bundle)
      - name: Build
        run: npm run build

      - name: Upload built bundle
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pactkeeper-dist
          path: dist/
          retention-days: 7
