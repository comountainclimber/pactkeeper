<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Mobile viewport contract:
      - `width=device-width` + `initial-scale=1` — pixel ratio anchored to
        the device so our `100dvh`-based layout calculations are stable.
      - `maximum-scale=1, user-scalable=no` — disable double-tap-to-zoom
        and pinch-zoom on the play canvas. Without this, every tap
        registers a spurious 300ms double-tap delay on iOS.
      - `viewport-fit=cover` — extend the canvas under the notch / home
        bar. Combined with `100dvh` (dynamic viewport height) below, the
        play field can use the full screen on iOS even while the URL bar
        is collapsing/expanding mid-frame.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050308" />
    <title>Pactkeeper</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    />
    <style>
      :root {
        --bg: #050308;
        /*
         * `--app-vh` is the height we hand to layouts that need to fill
         * the viewport. We prefer `100dvh` (dynamic viewport height, ie.
         * shrinks when the iOS URL bar expands) and fall back to `100vh`
         * for browsers that don't support it. Both are accounted for in
         * `#canvas-stage` and the pact screen's `.scene`.
         */
        --app-vh: 100vh;
        --app-vh: 100dvh;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: #f0e8d0;
        font-family: "VT323", ui-monospace, Menlo, monospace;
        min-height: 100%;
        overflow-x: hidden;
        /*
         * Lock the body from rubber-banding / pull-to-refresh on iOS
         * Safari and Android Chrome. Individual scroll containers
         * (the pact screen's `.scene`) still scroll inside this; this
         * just stops the whole viewport from drifting on swipe.
         */
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      #canvas-stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Smaller padding on phones — every px we steal from the
           canvas hurts readability on a 6" screen. */
        padding: clamp(6px, 1.5vmin, 24px);
        /* Use the dynamic viewport unit on supported browsers so the
           canvas re-centers when the iOS URL bar collapses/expands. */
        height: var(--app-vh);
        /* Safe-area insets — keep the canvas off the notch / home bar. */
        padding-top: max(clamp(6px, 1.5vmin, 24px), env(safe-area-inset-top));
        padding-bottom: max(clamp(6px, 1.5vmin, 24px), env(safe-area-inset-bottom));
        padding-left: max(clamp(6px, 1.5vmin, 24px), env(safe-area-inset-left));
        padding-right: max(clamp(6px, 1.5vmin, 24px), env(safe-area-inset-right));
      }
      /*
       * Canvas renders at its native logical resolution (944×448) but we
       * upscale via CSS so it fills more of the viewport. `image-rendering:
       * pixelated` keeps the upscale crisp instead of blurry-bilinear, which
       * is what we want for pixel art.
       *
       * The width formula has to bound on BOTH axes simultaneously: on a
       * portrait phone, `100vw` is small so width wins; on a wide
       * landscape monitor, height wins through the `vh * aspect-ratio`
       * term. `var(--app-vh)` makes both terms respond to iOS URL-bar
       * collapse without us re-laying-out in JS.
       */
      #canvas-stage canvas {
        background: #2a3d2a;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        display: block;
        width: 100%;
        max-width: min(
          calc(100vw - 12px),
          calc((var(--app-vh) - 12px) * 2.107)
        );
        height: auto;
        aspect-ratio: 944 / 448;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        /*
         * Touch contract: the canvas is a tap surface, never a scroll
         * surface. `touch-action: none` disables browser-managed
         * scrolling, panning, and pinch-zoom over the canvas so every
         * pointerdown lands where the player tapped. Without this,
         * iOS adds a 300ms delay on the first tap (waiting to see if
         * it's a double-tap-to-zoom).
         */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #canvas-stage[hidden] {
        display: none !important;
      }
      #pact-stage {
        position: relative;
        z-index: 50;
      }
      #pact-stage[hidden] {
        display: none !important;
      }
      /* Popover and result stages sit above the canvas; their internal
         elements decide their own placement (popover follows a tower, result
         overlay is fixed full-screen). */
      #popover-stage {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 80;
      }
      #popover-stage[hidden] {
        display: none !important;
      }
      #result-stage {
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      #result-stage[hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Canvas-rendered game (play screen) -->
    <div id="canvas-stage" hidden>
      <canvas id="game"></canvas>
    </div>

    <!-- DOM-rendered pact selection screen -->
    <div id="pact-stage"></div>

    <!-- DOM popover for tower upgrade UI (sits over the canvas while playing) -->
    <div id="popover-stage" hidden></div>

    <!-- DOM overlay for end-of-run result card (victory/defeat) -->
    <div id="result-stage" hidden></div>

    <script type="module" src="/src/main.ts"></script>
    <script src="/music.js"></script>
  </body>
</html>
